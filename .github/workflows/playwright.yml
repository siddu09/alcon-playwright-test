name: Playwright & BDD Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 2 * * 1-5'   # 02:00 UTC Mon–Fri
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: qa
        type: choice
        options: [dev, qa, prod]
      browser:
        description: Browser
        required: false
        default: chromium
        type: choice
        options: [chromium, firefox, webkit]
      tags:
        description: Cucumber tags (e.g. @smoke)
        required: false
        default: '@smoke'

env:
  NODE_VERSION: '20'

jobs:

  # ── 1. Static analysis ──────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  # ── 2. BDD Cucumber tests (multi-browser matrix) ────────────────────────────
  bdd:
    name: BDD / ${{ matrix.browser }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run BDD tests
        run: npm run test:${{ github.event.inputs.environment || 'qa' }}
        env:
          ENV:           ${{ github.event.inputs.environment || 'qa' }}
          BROWSER:       ${{ matrix.browser }}
          HEADLESS:      'true'
          TAGS:          ${{ github.event.inputs.tags || '@smoke' }}
          BASE_URL:      ${{ vars.BASE_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          RECORD_TRACE:  'true'
          CI:            'true'
        continue-on-error: true

      - name: Upload BDD artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-results-${{ matrix.browser }}
          path: |
            reports/allure-results/
            reports/screenshots/
            reports/traces/
            reports/cucumber-report.html
          retention-days: 30

  # ── 3. Playwright Test specs ────────────────────────────────────────────────
  playwright:
    name: Playwright Tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright specs
        run: npm run test:playwright
        env:
          ENV:           ${{ github.event.inputs.environment || 'qa' }}
          HEADLESS:      'true'
          BASE_URL:      ${{ vars.BASE_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ── 4. Allure report → GitHub Pages ────────────────────────────────────────
  allure-report:
    name: Publish Allure Report
    needs: bdd
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all BDD results
        uses: actions/download-artifact@v4
        with:
          pattern: bdd-results-*
          merge-multiple: true
          path: reports/allure-results

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results:  reports/allure-results
          allure_history:  allure-history
          keep_reports:    20

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token:  ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir:   allure-history